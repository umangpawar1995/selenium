<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>paper trading bot</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #0f1117; color: #e6e6e6; margin: 0; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtle { color: #8b93a7; font-size: 13px; }
  .cards { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
  .card { background: #161a24; border: 1px solid #262c3a; border-radius: 10px; padding: 14px 18px; min-width: 140px; }
  .card .label { font-size: 12px; color: #8b93a7; }
  .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .pos { color: #4ade80; } .neg { color: #f87171; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #262c3a; }
  th { color: #8b93a7; font-weight: 500; }
  section { margin-top: 28px; }
  canvas { background: #161a24; border: 1px solid #262c3a; border-radius: 10px; }
</style>
</head>
<body>
  <h1>paper trading bot</h1>
  <div class="subtle">real prices, fake money - refreshes every 3s</div>

  <div class="cards">
    <div class="card"><div class="label">equity</div><div class="value" id="equity">-</div></div>
    <div class="card"><div class="label">cash</div><div class="value" id="cash">-</div></div>
    <div class="card"><div class="label">starting balance</div><div class="value" id="starting">-</div></div>
    <div class="card"><div class="label">resets (busts)</div><div class="value" id="busts">-</div></div>
  </div>

  <section>
    <h3>equity curve</h3>
    <canvas id="chart" width="900" height="220"></canvas>
  </section>

  <section>
    <h3>open positions</h3>
    <table id="positions"><thead>
      <tr><th>symbol</th><th>side</th><th>qty</th><th>entry</th><th>mark</th><th>funding paid</th></tr>
    </thead><tbody></tbody></table>
  </section>

  <section>
    <h3>recent trades</h3>
    <table id="trades"><thead>
      <tr><th>symbol</th><th>side</th><th>entry</th><th>exit</th><th>net pnl</th><th>closed</th></tr>
    </thead><tbody></tbody></table>
  </section>

  <section>
    <h3>lessons banked from resets</h3>
    <table id="lessons"><thead>
      <tr><th>when</th><th>bust #</th><th>trades so far</th><th>win rate so far</th></tr>
    </thead><tbody></tbody></table>
  </section>

<script>
function money(n) { return "$" + Number(n).toFixed(2); }
function pct(n) { return (Number(n) * 100).toFixed(1) + "%"; }

function drawChart(history) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (history.length < 2) return;
  const values = history.map(h => h.equity);
  const min = Math.min(...values), max = Math.max(...values);
  const pad = 10;
  const w = canvas.width - pad * 2, h = canvas.height - pad * 2;
  ctx.strokeStyle = "#4ade80";
  ctx.lineWidth = 2;
  ctx.beginPath();
  history.forEach((point, i) => {
    const x = pad + (i / (history.length - 1)) * w;
    const norm = max === min ? 0.5 : (point.equity - min) / (max - min);
    const y = pad + h - norm * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}

async function refresh() {
  const res = await fetch("/api/state");
  const s = await res.json();

  document.getElementById("equity").textContent = money(s.equity);
  document.getElementById("equity").className = "value " + (s.equity >= s.starting_balance ? "pos" : "neg");
  document.getElementById("cash").textContent = money(s.cash);
  document.getElementById("starting").textContent = money(s.starting_balance);
  document.getElementById("busts").textContent = s.bust_count;

  drawChart(s.equity_history);

  const posBody = document.querySelector("#positions tbody");
  posBody.innerHTML = s.positions.map(p => `<tr>
    <td>${p.symbol}</td><td>${p.side}</td><td>${p.qty.toFixed(6)}</td>
    <td>${money(p.entry_price)}</td><td>${money(p.mark_price)}</td>
    <td>${money(p.funding_paid)}</td></tr>`).join("");

  const tradeBody = document.querySelector("#trades tbody");
  tradeBody.innerHTML = s.recent_trades.slice().reverse().map(t => `<tr>
    <td>${t.symbol}</td><td>${t.side}</td><td>${money(t.entry_price)}</td>
    <td>${money(t.exit_price)}</td>
    <td class="${t.net_pnl >= 0 ? 'pos' : 'neg'}">${money(t.net_pnl)}</td>
    <td>${new Date(t.exit_time).toLocaleString()}</td></tr>`).join("");

  const lessonBody = document.querySelector("#lessons tbody");
  lessonBody.innerHTML = s.lessons.slice().reverse().map(l => `<tr>
    <td>${new Date(l.timestamp).toLocaleString()}</td><td>${l.bust_count}</td>
    <td>${l.trades_so_far}</td><td>${pct(l.win_rate_so_far)}</td></tr>`).join("");
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
