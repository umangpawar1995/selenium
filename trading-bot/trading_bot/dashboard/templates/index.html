<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>paper trading bot</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #0f1117; color: #e6e6e6; margin: 0; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtle { color: #8b93a7; font-size: 13px; }
  .cards { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
  .card { background: #161a24; border: 1px solid #262c3a; border-radius: 10px; padding: 14px 18px; min-width: 140px; }
  .card .label { font-size: 12px; color: #8b93a7; }
  .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .pos { color: #4ade80; } .neg { color: #f87171; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #262c3a; }
  th { color: #8b93a7; font-weight: 500; }
  section { margin-top: 28px; }
  canvas { background: #161a24; border: 1px solid #262c3a; border-radius: 10px; }
  .panel { background: #161a24; border: 1px solid #262c3a; border-radius: 10px; padding: 18px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: #8b93a7; }
  select, input, button { background: #0f1117; color: #e6e6e6; border: 1px solid #262c3a; border-radius: 6px; padding: 8px 10px; font-size: 13px; }
  button { cursor: pointer; background: #2563eb; border-color: #2563eb; font-weight: 600; }
  button.secondary { background: #0f1117; border-color: #f87171; color: #f87171; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; background: #1f2937; }
  .error { color: #f87171; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
  <h1>paper trading bot</h1>
  <div class="subtle">real prices, fake money</div>

  <section class="panel">
    <div class="row">
      <div class="field">
        <label>exchange</label>
        <select id="exchange">
          <option value="nse">NSE (India)</option>
          <option value="bse">BSE (India)</option>
          <option value="crypto">Crypto (Binance)</option>
        </select>
      </div>
      <div class="field">
        <label id="symbolLabel">symbol (e.g. RELIANCE)</label>
        <input id="symbol" placeholder="RELIANCE" value="RELIANCE">
      </div>
      <div class="field">
        <label>strategy</label>
        <select id="strategy">
          {% for s in strategies %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
        </select>
      </div>
      <div class="field">
        <label>interval</label>
        <select id="interval">
          <option value="1d">1 day</option>
          <option value="1h">1 hour</option>
          <option value="4h">4 hour</option>
        </select>
      </div>
      <div class="field">
        <label>backtest days</label>
        <input id="days" type="number" value="365" style="width:80px">
      </div>
      <button id="backtestBtn">Run Backtest</button>
      <button id="startBtn">Start Paper Trading</button>
      <button id="stopBtn" class="secondary">Stop</button>
    </div>
    <div id="controlError" class="error"></div>
    <div id="backtestResults" style="margin-top:14px"></div>
  </section>

  <section>
    <span id="runningBadge" class="badge">no bot running</span>
  </section>

  <div class="cards">
    <div class="card"><div class="label">equity</div><div class="value" id="equity">-</div></div>
    <div class="card"><div class="label">cash</div><div class="value" id="cash">-</div></div>
    <div class="card"><div class="label">starting balance</div><div class="value" id="starting">-</div></div>
    <div class="card"><div class="label">resets (busts)</div><div class="value" id="busts">-</div></div>
  </div>

  <section>
    <h3>equity curve</h3>
    <canvas id="chart" width="900" height="220"></canvas>
  </section>

  <section>
    <h3>open positions</h3>
    <table id="positions"><thead>
      <tr><th>symbol</th><th>side</th><th>qty</th><th>entry</th><th>mark</th><th>funding paid</th></tr>
    </thead><tbody></tbody></table>
  </section>

  <section>
    <h3>recent trades</h3>
    <table id="trades"><thead>
      <tr><th>symbol</th><th>side</th><th>entry</th><th>exit</th><th>net pnl</th><th>closed</th></tr>
    </thead><tbody></tbody></table>
  </section>

  <section>
    <h3>lessons banked from resets</h3>
    <table id="lessons"><thead>
      <tr><th>when</th><th>bust #</th><th>trades so far</th><th>win rate so far</th></tr>
    </thead><tbody></tbody></table>
  </section>

<script>
function money(n) { return "$" + Number(n).toFixed(2); }
function pct(n) { return (Number(n) * 100).toFixed(1) + "%"; }

const exchangeEl = document.getElementById("exchange");
const symbolEl = document.getElementById("symbol");
const symbolLabelEl = document.getElementById("symbolLabel");
const intervalEl = document.getElementById("interval");

const EXCHANGE_INFO = {
  nse: { source: "yahoo", suffix: ".NS", placeholder: "RELIANCE", label: "symbol (e.g. RELIANCE)" },
  bse: { source: "yahoo", suffix: ".BO", placeholder: "RELIANCE", label: "symbol (e.g. RELIANCE)" },
  crypto: { source: "binance", suffix: "", placeholder: "BTCUSDT", label: "symbol (e.g. BTCUSDT)" },
};

exchangeEl.addEventListener("change", () => {
  const info = EXCHANGE_INFO[exchangeEl.value];
  symbolEl.placeholder = info.placeholder;
  symbolLabelEl.textContent = info.label;
});

function fullSymbol() {
  const info = EXCHANGE_INFO[exchangeEl.value];
  const raw = symbolEl.value.trim().toUpperCase();
  if (!info.suffix || raw.includes(".")) return raw;
  return raw + info.suffix;
}

function setError(msg) {
  document.getElementById("controlError").textContent = msg || "";
}

document.getElementById("backtestBtn").addEventListener("click", async () => {
  setError("");
  const resultsDiv = document.getElementById("backtestResults");
  resultsDiv.innerHTML = "running backtest against real history...";
  const info = EXCHANGE_INFO[exchangeEl.value];
  const res = await fetch("/api/backtest", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      symbol: fullSymbol(), source: info.source,
      interval: intervalEl.value, days: Number(document.getElementById("days").value),
    }),
  });
  const data = await res.json();
  if (!data.ok) { setError(data.error); resultsDiv.innerHTML = ""; return; }
  resultsDiv.innerHTML = `<table><thead><tr>
      <th>strategy</th><th>verdict</th><th>trades</th><th>return</th><th>sharpe</th><th>max dd</th><th>win rate</th><th>profit factor</th>
    </tr></thead><tbody>${data.results.map(r => `<tr>
      <td>${r.strategy}</td>
      <td class="${r.passed ? 'pos' : 'neg'}">${r.passed ? 'PASS' : 'fail'}</td>
      <td>${r.trades}</td><td>${pct(r.total_return)}</td><td>${r.sharpe.toFixed(2)}</td>
      <td>${pct(r.max_drawdown)}</td><td>${pct(r.win_rate)}</td><td>${r.profit_factor.toFixed(2)}</td>
    </tr>`).join("")}</tbody></table>`;
});

document.getElementById("startBtn").addEventListener("click", async () => {
  setError("");
  const info = EXCHANGE_INFO[exchangeEl.value];
  const res = await fetch("/api/start", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      symbol: fullSymbol(), source: info.source,
      strategy: document.getElementById("strategy").value,
      interval: intervalEl.value,
    }),
  });
  const data = await res.json();
  if (!data.ok) setError(data.error);
});

document.getElementById("stopBtn").addEventListener("click", async () => {
  await fetch("/api/stop", { method: "POST" });
});

function drawChart(history) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (history.length < 2) return;
  const values = history.map(h => h.equity);
  const min = Math.min(...values), max = Math.max(...values);
  const pad = 10;
  const w = canvas.width - pad * 2, h = canvas.height - pad * 2;
  ctx.strokeStyle = "#4ade80";
  ctx.lineWidth = 2;
  ctx.beginPath();
  history.forEach((point, i) => {
    const x = pad + (i / (history.length - 1)) * w;
    const norm = max === min ? 0.5 : (point.equity - min) / (max - min);
    const y = pad + h - norm * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}

async function refresh() {
  const res = await fetch("/api/state");
  const s = await res.json();

  const badge = document.getElementById("runningBadge");
  if (!s.running) {
    badge.textContent = "no bot running - pick a stock and strategy above, then Start";
    document.getElementById("equity").textContent = "-";
    document.getElementById("cash").textContent = "-";
    document.getElementById("starting").textContent = "-";
    document.getElementById("busts").textContent = "-";
    document.querySelector("#positions tbody").innerHTML = "";
    document.querySelector("#trades tbody").innerHTML = "";
    document.querySelector("#lessons tbody").innerHTML = "";
    return;
  }
  badge.textContent = `running: ${s.current.symbol} (${s.current.source}) - ${s.current.strategy}`;

  document.getElementById("equity").textContent = money(s.equity);
  document.getElementById("equity").className = "value " + (s.equity >= s.starting_balance ? "pos" : "neg");
  document.getElementById("cash").textContent = money(s.cash);
  document.getElementById("starting").textContent = money(s.starting_balance);
  document.getElementById("busts").textContent = s.bust_count;

  drawChart(s.equity_history);

  const posBody = document.querySelector("#positions tbody");
  posBody.innerHTML = s.positions.map(p => `<tr>
    <td>${p.symbol}</td><td>${p.side}</td><td>${p.qty.toFixed(6)}</td>
    <td>${money(p.entry_price)}</td><td>${money(p.mark_price)}</td>
    <td>${money(p.funding_paid)}</td></tr>`).join("");

  const tradeBody = document.querySelector("#trades tbody");
  tradeBody.innerHTML = s.recent_trades.slice().reverse().map(t => `<tr>
    <td>${t.symbol}</td><td>${t.side}</td><td>${money(t.entry_price)}</td>
    <td>${money(t.exit_price)}</td>
    <td class="${t.net_pnl >= 0 ? 'pos' : 'neg'}">${money(t.net_pnl)}</td>
    <td>${new Date(t.exit_time).toLocaleString()}</td></tr>`).join("");

  const lessonBody = document.querySelector("#lessons tbody");
  lessonBody.innerHTML = s.lessons.slice().reverse().map(l => `<tr>
    <td>${new Date(l.timestamp).toLocaleString()}</td><td>${l.bust_count}</td>
    <td>${l.trades_so_far}</td><td>${pct(l.win_rate_so_far)}</td></tr>`).join("");
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
